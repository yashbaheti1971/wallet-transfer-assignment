openapi: 3.0.3
info:
  title: Wallet Transfer Service API
  description: API contract for the wallet-to-wallet transfer service, including transfer execution and balance retrieval.
  version: 1.0.0
paths:
  /transfers:
    post:
      summary: Create Transfer
      description: Initiates a wallet-to-wallet transfer.
      requestBody:
        required: true
        content:
          application_json:
            schema:
              $ref: '#/components/schemas/TransferRequest'
      responses:
        '200':
          description: Transfer processed successfully
          content:
            application_json:
              schema:
                $ref: '#/components/schemas/TransferSuccessResponse'
        '400':
          description: Invalid request body or validation error
          content:
            application_json:
              schema:
                $ref: '#/components/schemas/TransferFailureResponse'
        '502':
          description: Bad Gateway
          content:
            application_json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service Unavailable
          content:
            application_json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /wallet/balance/{wallet_id}:
    get:
      summary: Get Wallet Balance
      description: Retrieves the current balance of the specified wallet.
      parameters:
        - name: wallet_id
          in: path
          required: true
          description: The unique identifier of the wallet.
          schema:
            type: string
            example: wallet_1
      responses:
        '200':
          description: Wallet balance retrieved successfully
          content:
            application_json:
              schema:
                $ref: '#/components/schemas/BalanceSuccessResponse'
        '404':
          description: Wallet not found or invalid wallet ID
          content:
            application_json:
              schema:
                $ref: '#/components/schemas/BalanceFailureResponse'

components:
  schemas:
    TransferRequest:
      type: object
      required:
        - txnId
        - fromWalletId
        - toWalletId
        - amount
      properties:
        txnId:
          type: string
          description: Unique transaction ID / Idempotency Key
          example: abc123
        fromWalletId:
          type: string
          description: Sender wallet ID
          example: wallet_1
        toWalletId:
          type: string
          description: Recipient wallet ID
          example: wallet_2
        amount:
          type: integer
          description: The amount to transfer
          example: 100

    TransferSuccessResponse:
      type: object
      required:
        - data
        - error
        - status
      properties:
        data:
          type: object
          required:
            - txnID
            - status
          properties:
            txnID:
              type: string
              example: abc123
            status:
              type: string
              enum: [SUCCESS, PENDING, FAILURE]
              example: SUCCESS
        error:
          type: string
          nullable: true
          default: null
          example: null
        status:
          type: integer
          example: 200

    TransferFailureResponse:
      type: object
      required:
        - data
        - error
        - status
      properties:
        data:
          type: object
          example: {}
        error:
          type: string
          enum: ["Invalid Wallet ID", "Insufficient balance"]
          example: Insufficient balance
        status:
          type: integer
          example: 400

    ErrorResponse:
      type: object
      required:
        - data
        - error
        - status
      properties:
        data:
          type: object
          example: {}
        error:
          type: string
          nullable: true
          default: null
          example: null
        status:
          type: integer
          example: 502

    BalanceSuccessResponse:
      type: object
      required:
        - data
        - error
        - status
      properties:
        data:
          type: object
          required:
            - wallet_id
            - balance
          properties:
            wallet_id:
              type: string
              example: wallet_1
            balance:
              type: integer
              example: 1000
        error:
          type: string
          nullable: true
          default: null
          example: null
        status:
          type: integer
          example: 200

    BalanceFailureResponse:
      type: object
      required:
        - data
        - error
        - status
      properties:
        data:
          type: object
          example: {}
        error:
          type: string
          example: Invalid Wallet ID
        status:
          type: integer
          example: 400
